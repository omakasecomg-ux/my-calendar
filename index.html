<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#E24B4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="カレンダー">
<link rel="manifest" href="manifest.json">
<title>マイカレンダー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Yu Gothic',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.app{max-width:430px;margin:0 auto;background:#fff;min-height:100vh;display:flex;flex-direction:column}
.header{padding:16px;border-bottom:0.5px solid rgba(0,0,0,0.1);display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:18px;font-weight:500}
.nav-tabs{display:flex;border-bottom:0.5px solid rgba(0,0,0,0.1)}
.nav-tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;color:#888;border-bottom:2px solid transparent;transition:all .2s}
.nav-tab.active{color:#1a1a1a;border-bottom:2px solid #1a1a1a}
.content{flex:1;overflow-y:auto}
.month-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.month-nav button{background:none;border:none;cursor:pointer;padding:6px 10px;border-radius:6px;color:#888;font-size:16px}
.month-nav button:hover{background:#f5f5f0}
.month-title{font-size:16px;font-weight:500}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:rgba(0,0,0,0.08);border-top:0.5px solid rgba(0,0,0,0.08)}
.cal-dow{background:#f9f9f7;text-align:center;padding:8px 0;font-size:11px;font-weight:500;color:#888}
.cal-dow:first-child{color:#E24B4A}
.cal-dow:last-child{color:#378ADD}
.cal-cell{background:#fff;min-height:56px;padding:4px;cursor:pointer;position:relative}
.cal-cell:hover{background:#f9f9f7}
.cal-cell.today .day-num{background:#E24B4A;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.cal-cell.selected{background:#EBF4FD}
.day-num{font-size:12px;font-weight:500;width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin-bottom:2px}
.cal-cell.other-month .day-num{color:#ccc}
.cal-cell:nth-child(7n+1) .day-num{color:#E24B4A}
.cal-cell:nth-child(7n+1).today .day-num{color:#fff}
.cal-cell:nth-child(7n) .day-num{color:#378ADD}
.cal-cell:nth-child(7n).today .day-num{color:#fff}
.event-dot{height:4px;border-radius:2px;margin:1px 0}
.dot-coral{background:#D85A30}
.dot-blue{background:#378ADD}
.dot-green{background:#639922}
.dot-purple{background:#7F77DD}
.dot-amber{background:#BA7517}
.day-detail{padding:16px;border-top:0.5px solid rgba(0,0,0,0.08)}
.day-detail h3{font-size:14px;font-weight:500;margin-bottom:12px;color:#888}
.event-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:8px;background:#f9f9f7;margin-bottom:8px;cursor:pointer}
.event-item:hover{background:#f0f0eb}
.event-color-bar{width:3px;height:40px;border-radius:2px;flex-shrink:0;margin-top:2px}
.event-info{flex:1}
.event-title{font-size:14px;font-weight:500}
.event-time{font-size:12px;color:#888;margin-top:2px}
.add-btn{width:48px;height:48px;border-radius:50%;background:#E24B4A;border:none;color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(226,75,74,0.35);transition:transform .15s}
.add-btn:hover{transform:scale(1.08)}
.fab{position:sticky;bottom:20px;right:20px;display:flex;justify-content:flex-end;padding-right:20px;padding-bottom:4px}
.todo-section{padding:16px}
.todo-input-row{display:flex;gap:8px;margin-bottom:16px}
.todo-input-row input{flex:1;padding:8px 12px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;background:#f9f9f7;color:#1a1a1a;font-size:14px}
.todo-input-row button{padding:8px 14px;border-radius:8px;background:#E24B4A;border:none;color:#fff;font-size:13px;font-weight:500;cursor:pointer}
.todo-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:6px;border:0.5px solid rgba(0,0,0,0.08)}
.todo-item.done{opacity:.5}
.todo-check{width:20px;height:20px;border:2px solid rgba(0,0,0,0.2);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.todo-check.checked{background:#639922;border-color:#639922;color:#fff;font-size:12px}
.todo-text{flex:1;font-size:14px}
.todo-text.done-text{text-decoration:line-through;color:#bbb}
.todo-del{background:none;border:none;color:#bbb;cursor:pointer;font-size:16px;padding:0 4px}
.todo-del:hover{color:#E24B4A}
.list-section{padding:16px}
.list-day-group{margin-bottom:20px}
.list-day-label{font-size:12px;font-weight:500;color:#888;margin-bottom:8px;padding-bottom:4px;border-bottom:0.5px solid rgba(0,0,0,0.08)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:430px;max-height:85vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:500;margin-bottom:16px}
.modal label{font-size:12px;color:#888;display:block;margin-bottom:4px;margin-top:12px}
.modal input,.modal select,.modal textarea{width:100%;padding:9px 12px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;background:#f9f9f7;color:#1a1a1a;font-size:14px}
.modal textarea{height:70px;resize:none}
.color-row{display:flex;gap:8px;margin-top:6px}
.color-btn{width:28px;height:28px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:border-color .15s}
.color-btn.sel{border-color:#1a1a1a}
.modal-actions{display:flex;gap:8px;margin-top:20px}
.modal-actions button{flex:1;padding:11px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;border:none}
.btn-cancel{background:#f0f0eb;color:#888}
.btn-del{background:#FCEBEB;color:#E24B4A}
.btn-save{background:#E24B4A;color:#fff}
.empty-state{text-align:center;padding:40px 20px;color:#bbb;font-size:14px}
.todo-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.todo-header h2{font-size:15px;font-weight:500}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <h1>マイカレンダー</h1>
    <button class="add-btn" onclick="openModal()" style="position:static;width:36px;height:36px;font-size:18px;box-shadow:none">+</button>
  </div>
  <div class="nav-tabs">
    <div class="nav-tab active" onclick="switchTab('cal')">月表示</div>
    <div class="nav-tab" onclick="switchTab('list')">予定リスト</div>
    <div class="nav-tab" onclick="switchTab('todo')">ToDo</div>
  </div>
  <div class="content" id="content"></div>
</div>
<script>
const COLORS=['#D85A30','#378ADD','#639922','#7F77DD','#BA7517'];
const CNAMES=['coral','blue','green','purple','amber'];
const CAT_LABELS={work:'仕事',personal:'プライベート',health:'健康',other:'その他'};
let today=new Date();
let curYear=today.getFullYear();
let curMonth=today.getMonth();
let selDate=null;
let activeTab='cal';
let events=JSON.parse(localStorage.getItem('cal_events')||'[]');
let todos=JSON.parse(localStorage.getItem('cal_todos')||'[]');
function save(){localStorage.setItem('cal_events',JSON.stringify(events));localStorage.setItem('cal_todos',JSON.stringify(todos));}
function fmt(d){return d.toISOString().split('T')[0]}
function parseDate(s){let p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2])}
function fmtDisp(d){return `${d.getMonth()+1}月${d.getDate()}日`}
function switchTab(t){activeTab=t;document.querySelectorAll('.nav-tab').forEach((el,i)=>{el.classList.toggle('active',['cal','list','todo'][i]===t);});render();}
function render(){if(activeTab==='cal')renderCal();else if(activeTab==='list')renderList();else renderTodo();}
function eventsOnDate(d){return events.filter(e=>e.date===d||(e.repeat==='daily'&&e.date<=d)||(e.repeat==='weekly'&&e.date<=d&&parseDate(d).getDay()===parseDate(e.date).getDay())||(e.repeat==='monthly'&&e.date<=d&&parseDate(d).getDate()===parseDate(e.date).getDate()));}
function renderCal(){
  const c=document.getElementById('content');
  let html=`<div class="month-nav"><button onclick="prevMonth()">&#8249;</button><span class="month-title">${curYear}年${curMonth+1}月</span><button onclick="nextMonth()">&#8250;</button></div><div class="cal-grid"><div class="cal-dow">日</div><div class="cal-dow">月</div><div class="cal-dow">火</div><div class="cal-dow">水</div><div class="cal-dow">木</div><div class="cal-dow">金</div><div class="cal-dow">土</div>`;
  let first=new Date(curYear,curMonth,1);
  let startDay=first.getDay();
  let daysInMonth=new Date(curYear,curMonth+1,0).getDate();
  let prevDays=new Date(curYear,curMonth,0).getDate();
  for(let i=0;i<startDay;i++){let d=fmt(new Date(curYear,curMonth-1,prevDays-startDay+i+1));html+=`<div class="cal-cell other-month" onclick="selectDate('${d}')"><div class="day-num">${prevDays-startDay+i+1}</div></div>`;}
  for(let d=1;d<=daysInMonth;d++){let dt=new Date(curYear,curMonth,d);let ds=fmt(dt);let isToday=ds===fmt(today);let isSel=ds===selDate;let evs=eventsOnDate(ds);let cls='cal-cell'+(isToday?' today':'')+(isSel?' selected':'');let dots=evs.slice(0,3).map(e=>`<div class="event-dot dot-${CNAMES[COLORS.indexOf(e.color)]||'coral'}"></div>`).join('');html+=`<div class="${cls}" onclick="selectDate('${ds}')"><div class="day-num">${d}</div>${dots}</div>`;}
  let rem=42-(startDay+daysInMonth);for(let i=1;i<=rem;i++){let d=fmt(new Date(curYear,curMonth+1,i));html+=`<div class="cal-cell other-month" onclick="selectDate('${d}')"><div class="day-num">${i}</div></div>`;}
  html+=`</div>`;
  if(selDate){let evs=eventsOnDate(selDate);html+=`<div class="day-detail"><h3>${fmtDisp(parseDate(selDate))}の予定</h3>`;if(!evs.length)html+=`<div style="color:#bbb;font-size:13px;padding:8px 0">予定なし</div>`;evs.forEach(e=>{html+=`<div class="event-item" onclick="editEvent('${e.id}')"><div class="event-color-bar" style="background:${e.color}"></div><div class="event-info"><div class="event-title">${e.title}</div><div class="event-time">${e.time||'終日'}${e.repeat&&e.repeat!=='none'?' 🔁':''}</div>${e.memo?`<div style="font-size:12px;color:#888;margin-top:2px">${e.memo}</div>`:''}</div></div>`;});html+=`</div>`;}
  c.innerHTML=html+`<div class="fab"><button class="add-btn" onclick="openModal('${selDate||fmt(today)}')">+</button></div>`;
}
function renderList(){
  const c=document.getElementById('content');
  let upcoming={};let now=fmt(today);
  events.forEach(e=>{let dates=[];if(e.repeat==='none'||!e.repeat){if(e.date>=now)dates.push(e.date);}else{let d=new Date(today);for(let i=0;i<60;i++){let ds=fmt(d);let evs=eventsOnDate(ds);if(evs.find(ev=>ev.id===e.id)&&!dates.includes(ds))dates.push(ds);d.setDate(d.getDate()+1);}}dates.forEach(d=>{if(!upcoming[d])upcoming[d]=[];upcoming[d].push(e);});});
  let sorted=Object.keys(upcoming).sort().slice(0,30);
  let html='<div class="list-section">';
  if(!sorted.length){html+=`<div class="empty-state">今後の予定はありません</div>`;}
  sorted.forEach(d=>{html+=`<div class="list-day-group"><div class="list-day-label">${fmtDisp(parseDate(d))}（${'日月火水木金土'[parseDate(d).getDay()]}）</div>`;upcoming[d].forEach(e=>{html+=`<div class="event-item" onclick="editEvent('${e.id}')"><div class="event-color-bar" style="background:${e.color};height:32px"></div><div class="event-info"><div class="event-title">${e.title}</div><div class="event-time">${e.time||'終日'}　<span style="font-size:11px;background:#f0f0eb;padding:1px 6px;border-radius:8px">${CAT_LABELS[e.category]||''}</span></div></div></div>`;});html+=`</div>`;});
  html+=`</div><div class="fab"><button class="add-btn" onclick="openModal()">+</button></div>`;
  c.innerHTML=html;
}
function renderTodo(){
  const c=document.getElementById('content');
  let pending=todos.filter(t=>!t.done);let done=todos.filter(t=>t.done);
  let html=`<div class="todo-section"><div class="todo-input-row"><input type="text" id="todo-in" placeholder="新しいToDoを追加..." onkeydown="if(event.key==='Enter')addTodo()"><button onclick="addTodo()">追加</button></div><div class="todo-header"><h2>未完了 (${pending.length})</h2></div>`;
  if(!pending.length)html+=`<div style="color:#bbb;font-size:13px;padding:8px 0">タスクなし</div>`;
  pending.forEach(t=>{html+=`<div class="todo-item"><div class="todo-check" onclick="toggleTodo('${t.id}')"></div><span class="todo-text">${t.text}</span><button class="todo-del" onclick="delTodo('${t.id}')">×</button></div>`;});
  if(done.length){html+=`<div class="todo-header" style="margin-top:16px"><h2>完了 (${done.length})</h2></div>`;done.forEach(t=>{html+=`<div class="todo-item done"><div class="todo-check checked" onclick="toggleTodo('${t.id}')">✓</div><span class="todo-text done-text">${t.text}</span><button class="todo-del" onclick="delTodo('${t.id}')">×</button></div>`;});}
  html+=`</div>`;c.innerHTML=html;
}
function addTodo(){let inp=document.getElementById('todo-in');if(!inp||!inp.value.trim())return;todos.push({id:Date.now()+'',text:inp.value.trim(),done:false});save();render();}
function toggleTodo(id){let t=todos.find(t=>t.id===id);if(t)t.done=!t.done;save();render();}
function delTodo(id){todos=todos.filter(t=>t.id!==id);save();render();}
function selectDate(d){selDate=d;let dt=parseDate(d);if(dt.getFullYear()!==curYear||dt.getMonth()!==curMonth){curYear=dt.getFullYear();curMonth=dt.getMonth();}renderCal();}
function prevMonth(){curMonth--;if(curMonth<0){curMonth=11;curYear--;}render();}
function nextMonth(){curMonth++;if(curMonth>11){curMonth=0;curYear++;}render();}
let editId=null;
function openModal(date){editId=null;let d=date||selDate||fmt(today);showModal({id:null,title:'',date:d,time:'',category:'personal',color:COLORS[0],repeat:'none',memo:''});}
function editEvent(id){let e=events.find(e=>e.id===id);if(!e)return;editId=id;showModal(e);}
function showModal(e){
  let colorBtns=COLORS.map((c,i)=>`<div class="color-btn${e.color===c?' sel':''}" style="background:${c}" onclick="selColor('${c}',this)"></div>`).join('');
  let html=`<div class="modal-bg" id="modal-bg" onclick="closeModalBg(event)"><div class="modal"><h2>${editId?'予定を編集':'予定を追加'}</h2><label>タイトル</label><input id="ev-title" type="text" value="${e.title||''}" placeholder="タイトルを入力"><label>日付</label><input id="ev-date" type="date" value="${e.date||fmt(today)}"><label>時間（任意）</label><input id="ev-time" type="time" value="${e.time||''}"><label>カテゴリー</label><select id="ev-cat"><option value="work"${e.category==='work'?' selected':''}>仕事</option><option value="personal"${e.category==='personal'?' selected':''}>プライベート</option><option value="health"${e.category==='health'?' selected':''}>健康</option><option value="other"${e.category==='other'?' selected':''}>その他</option></select><label>繰り返し</label><select id="ev-repeat"><option value="none"${(e.repeat||'none')==='none'?' selected':''}>なし</option><option value="daily"${e.repeat==='daily'?' selected':''}>毎日</option><option value="weekly"${e.repeat==='weekly'?' selected':''}>毎週</option><option value="monthly"${e.repeat==='monthly'?' selected':''}>毎月</option></select><label>カラー</label><div class="color-row" id="color-row">${colorBtns}</div><input type="hidden" id="ev-color" value="${e.color||COLORS[0]}"><label>メモ</label><textarea id="ev-memo" placeholder="メモ（任意）">${e.memo||''}</textarea><div class="modal-actions">${editId?`<button class="btn-del" onclick="deleteEvent('${editId}')">削除</button>`:''}<button class="btn-cancel" onclick="closeModal()">キャンセル</button><button class="btn-save" onclick="saveEvent()">保存</button></div></div></div>`;
  let el=document.createElement('div');el.id='modal-wrap';el.innerHTML=html;document.getElementById('app').appendChild(el);
}
function selColor(c,el){document.getElementById('ev-color').value=c;document.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');}
function closeModal(){let m=document.getElementById('modal-wrap');if(m)m.remove();}
function closeModalBg(ev){if(ev.target.id==='modal-bg')closeModal();}
function saveEvent(){let title=document.getElementById('ev-title').value.trim();if(!title)return;let ev={id:editId||Date.now()+'',title,date:document.getElementById('ev-date').value,time:document.getElementById('ev-time').value,category:document.getElementById('ev-cat').value,repeat:document.getElementById('ev-repeat').value,color:document.getElementById('ev-color').value,memo:document.getElementById('ev-memo').value};if(editId){events=events.map(e=>e.id===editId?ev:e);}else{events.push(ev);}save();closeModal();render();}
function deleteEvent(id){if(!confirm('この予定を削除しますか？'))return;events=events.filter(e=>e.id!==id);save();closeModal();render();}
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});}
render();
</script>
</body>
</html>
